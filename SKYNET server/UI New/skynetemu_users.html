<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNETEMU | Red de Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        skynet: {
                            black: '#0a0a0a',
                            dark: '#111111',
                            card: '#161616',
                            border: '#222222',
                            accent: '#3b82f6',
                            muted: '#888888'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #0a0a0a; color: #ededed; font-family: 'Inter', sans-serif; }
        .custom-border { border: 1px solid #222222; }
        .nav-link { transition: all 0.2s; }
        .nav-link:hover { color: #fff; background: #1a1a1a; }
        .nav-link.active { color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="h-16 bg-skynet-black border-b border-skynet-border flex items-center justify-between px-8 z-20">
        <div class="flex items-center space-x-12">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-white rounded flex items-center justify-center">
                    <i class="fas fa-microchip text-skynet-black text-lg"></i>
                </div>
                <span class="font-bold tracking-tighter text-lg">SKYNET<span class="text-skynet-accent">EMU</span></span>
            </div>
            <nav class="flex space-x-1 h-16">
                <a href="skynetemu_dashboard.html" class="nav-link flex items-center px-4 text-xs font-bold uppercase tracking-widest text-skynet-muted">Dashboard</a>
                <a href="skynetemu_users.html" class="nav-link active flex items-center px-4 text-xs font-bold uppercase tracking-widest">Usuarios</a>
                <a href="skynetemu_stats.html" class="nav-link flex items-center px-4 text-xs font-bold uppercase tracking-widest text-skynet-muted">Estadísticas</a>
            </nav>
        </div>
        <div class="flex items-center space-x-6">
            <img src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" class="w-10 h-10 rounded-lg border border-skynet-border" alt="Avatar">
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="max-w-6xl mx-auto">
            
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Red de Usuarios</h1>
                    <p class="text-skynet-muted mt-1">Conecta con otros agentes activos en la red SKYNET.</p>
                </div>
                <div class="relative w-full md:w-80">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-skynet-muted text-xs"></i>
                    <input type="text" class="w-full bg-skynet-card border border-skynet-border rounded-lg py-2 pl-10 pr-4 text-sm focus:border-skynet-accent outline-none transition" placeholder="Buscar por usuario o ID...">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- User Card 1 (Friend) -->
                <div class="bg-skynet-card custom-border rounded-xl p-6 flex items-center space-x-4 hover:bg-skynet-dark transition group">
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?u=10" class="w-14 h-14 rounded-xl border border-skynet-border" alt="U">
                        <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-skynet-card"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold truncate">Alex_Sniper</p>
                        <p class="text-[10px] text-skynet-muted uppercase tracking-widest">Jugando: Dota 2</p>
                    </div>
                    <button class="w-10 h-10 rounded-lg bg-red-500/10 text-red-500 border border-red-500/20 flex items-center justify-center hover:bg-red-500 hover:text-white transition" title="Eliminar amigo">
                        <i class="fas fa-user-minus text-xs"></i>
                    </button>
                </div>

                <!-- User Card 2 (Not Friend) -->
                <div class="bg-skynet-card custom-border rounded-xl p-6 flex items-center space-x-4 hover:bg-skynet-dark transition group">
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?u=11" class="w-14 h-14 rounded-xl border border-skynet-border" alt="U">
                        <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-gray-500 rounded-full border-2 border-skynet-card"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold truncate">Dark_Knight</p>
                        <p class="text-[10px] text-skynet-muted uppercase tracking-widest">Desconectado</p>
                    </div>
                    <button class="w-10 h-10 rounded-lg bg-skynet-accent/10 text-skynet-accent border border-skynet-accent/20 flex items-center justify-center hover:bg-skynet-accent hover:text-white transition" title="Añadir amigo">
                        <i class="fas fa-user-plus text-xs"></i>
                    </button>
                </div>

                <!-- User Card 3 (Friend) -->
                <div class="bg-skynet-card custom-border rounded-xl p-6 flex items-center space-x-4 hover:bg-skynet-dark transition group">
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?u=12" class="w-14 h-14 rounded-xl border border-skynet-border" alt="U">
                        <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-skynet-card"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold truncate">Sara_Gamer</p>
                        <p class="text-[10px] text-skynet-muted uppercase tracking-widest">En el Dashboard</p>
                    </div>
                    <button class="w-10 h-10 rounded-lg bg-red-500/10 text-red-500 border border-red-500/20 flex items-center justify-center hover:bg-red-500 hover:text-white transition" title="Eliminar amigo">
                        <i class="fas fa-user-minus text-xs"></i>
                    </button>
                </div>
                
                <!-- More placeholders... -->
                <div class="bg-skynet-card custom-border rounded-xl p-6 flex items-center space-x-4 hover:bg-skynet-dark transition group">
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?u=13" class="w-14 h-14 rounded-xl border border-skynet-border" alt="U">
                        <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-gray-500 rounded-full border-2 border-skynet-card"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold truncate">Void_Walker</p>
                        <p class="text-[10px] text-skynet-muted uppercase tracking-widest">Desconectado</p>
                    </div>
                    <button class="w-10 h-10 rounded-lg bg-skynet-accent/10 text-skynet-accent border border-skynet-accent/20 flex items-center justify-center hover:bg-skynet-accent hover:text-white transition" title="Añadir amigo">
                        <i class="fas fa-user-plus text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
