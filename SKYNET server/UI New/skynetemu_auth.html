<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNETEMU | Acceso al Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        skynet: {
                            black: '#0a0a0a',
                            dark: '#111111',
                            card: '#161616',
                            border: '#222222',
                            accent: '#3b82f6',
                            muted: '#888888'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #0a0a0a; color: #ededed; font-family: 'Inter', sans-serif; }
        .auth-card { border: 1px solid #222222; background: #111111; }
        .input-field { background: #0a0a0a; border: 1px solid #222222; transition: all 0.2s; }
        .input-field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/10 via-skynet-black to-skynet-black">

    <div class="w-full max-w-md space-y-8">
        <!-- Logo -->
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-xl mb-4 shadow-[0_0_30px_rgba(59,130,246,0.2)]">
                <i class="fas fa-microchip text-3xl text-skynet-black"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tighter">SKYNET<span class="text-skynet-accent">EMU</span></h1>
            <p class="text-skynet-muted text-sm mt-2">Protocolo de emulación centralizado</p>
        </div>

        <!-- Auth Card -->
        <div id="login-form" class="auth-card p-8 rounded-2xl shadow-2xl">
            <h2 class="text-xl font-semibold mb-6">Iniciar Sesión</h2>
            <form class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-skynet-muted uppercase tracking-widest mb-2">Usuario / Email</label>
                    <input type="text" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="nombre@ejemplo.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-skynet-muted uppercase tracking-widest mb-2">Contraseña</label>
                    <input type="password" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between text-xs">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-skynet-border bg-skynet-black text-skynet-accent focus:ring-skynet-accent">
                        <span class="text-skynet-muted">Recordarme</span>
                    </label>
                    <a href="#" class="text-skynet-accent hover:underline">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-gray-200 transition-all duration-200 mt-6">
                    Entrar al Sistema
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-skynet-border text-center">
                <p class="text-sm text-skynet-muted">
                    ¿No tienes una cuenta? 
                    <button onclick="toggleAuth()" class="text-skynet-accent font-semibold hover:underline">Regístrate</button>
                </p>
            </div>
        </div>

        <!-- Register Card (Hidden by default) -->
        <div id="register-form" class="auth-card p-8 rounded-2xl shadow-2xl hidden">
            <h2 class="text-xl font-semibold mb-6">Crear Cuenta</h2>
            <form class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-skynet-muted uppercase tracking-widest mb-2">Nombre</label>
                        <input type="text" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="John">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-skynet-muted uppercase tracking-widest mb-2">Usuario</label>
                        <input type="text" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="johndoe">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-skynet-muted uppercase tracking-widest mb-2">Email</label>
                    <input type="email" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="john@skynet.io">
                </div>
                <div>
                    <label class="block text-xs font-medium text-skynet-muted uppercase tracking-widest mb-2">Contraseña</label>
                    <input type="password" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-skynet-accent text-white font-bold py-3 rounded-lg hover:bg-blue-600 transition-all duration-200 mt-6">
                    Crear mi cuenta
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-skynet-border text-center">
                <p class="text-sm text-skynet-muted">
                    ¿Ya eres miembro? 
                    <button onclick="toggleAuth()" class="text-skynet-accent font-semibold hover:underline">Inicia sesión</button>
                </p>
            </div>
        </div>

        <p class="text-center text-[10px] text-skynet-muted uppercase tracking-[0.3em]">SKYNET_NETWORK_ENCRYPTION_ACTIVE</p>
    </div>

    <script>
        function toggleAuth() {
            const login = document.getElementById('login-form');
            const register = document.getElementById('register-form');
            login.classList.toggle('hidden');
            register.classList.toggle('hidden');
        }
    </script>
</body>
</html>
